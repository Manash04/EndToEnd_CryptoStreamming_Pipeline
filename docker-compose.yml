services:

  # ─────────────────────────────────────────
  # KAFKA LAYER
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:29092,PLAINTEXT_EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic btcusdt-trades --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ethusdt-trades --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic solusdt-trades --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic bnbusdt-trades --partitions 3 --replication-factor 1
      echo 'Topics ready.'
      "

  # ─────────────────────────────────────────
  # SPARK LAYER
  # ─────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    user: root
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_NO_DAEMONIZE=true
    entrypoint: ["/opt/spark/sbin/start-master.sh"]
    ports:
      - "8081:8080"
      - "7077:7077"
    volumes:
      - ./spark:/opt/spark-apps
      - ./airflow/batch:/opt/spark-apps/batch   # ← add this line
      - spark-logs:/opt/spark/logs

  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark-worker
    user: root
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_NO_DAEMONIZE=true
    entrypoint: ["/opt/spark/sbin/start-worker.sh", "spark://spark-master:7077"]
    ports:
      - "8082:8081"
    volumes:
      - ./spark:/opt/spark-apps
      - ./airflow/batch:/opt/spark-apps/batch   # ← add this line
      - spark-logs:/opt/spark/logs

  # ─────────────────────────────────────────
  # POSTGRES
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: crypto
      POSTGRES_PASSWORD: crypto123
      POSTGRES_DB: crypto_analytics
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto -d crypto_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # GRAFANA
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana

  # ─────────────────────────────────────────
  # AIRFLOW
  # ─────────────────────────────────────────
  airflow:
    image: apache/airflow:2.8.0
    container_name: airflow
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://crypto:crypto123@postgres:5432/crypto_analytics
      - AIRFLOW__CORE__FERNET_KEY=your-fernet-key-here
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=your-secret-key-here
      - AIRFLOW__WEBSERVER__WORKERS=1
      - AIRFLOW__WEBSERVER__WORKER_TIMEOUT=120
      - ADLS_ACCOUNT_NAME=${ADLS_ACCOUNT_NAME}
      - ADLS_ACCOUNT_KEY=${ADLS_ACCOUNT_KEY}
      - ADLS_CONTAINER=${ADLS_CONTAINER}
      - PG_HOST=postgres
      - PG_DB=crypto_analytics
      - PG_USER=crypto
      - PG_PASS=crypto123
    mem_limit: 3g
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/batch:/opt/airflow/batch
      - airflow-logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock  # ← mount Docker socket
    user: "0:0"  # ← run as root to access Docker socket
    command: >
      bash -c "pip install docker apache-airflow-providers-docker &&
              airflow db init &&
              airflow users create --username admin --password admin123
                --firstname Admin --lastname User
                --role Admin --email admin@crypto.com 2>/dev/null || true &&
              airflow webserver & airflow scheduler"

volumes:
  spark-logs:
  postgres-data:
  grafana-data:
  airflow-logs:
  spark-ivy-cache:  